<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi RSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Mi RSS</h1>
    <button id="btn-refrescar">Actualizar</button>
  </header>

  <div class="layout">
    <aside class="controles">
      <div class="controles-grupo">
        <label class="controles-etiqueta" for="filtro-fuente">Fuente</label>
        <select id="filtro-fuente">
          <option value="">Todas las fuentes</option>
        </select>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" id="filtro-no-leidos" />
        Solo no leídos
      </label>

      <label class="checkbox-label">
        <input type="checkbox" id="filtro-favoritos" />
        Solo favoritos
      </label>

      <div class="grupo-marcar-todos">
        <button id="btn-marcar-todos" class="secundario">Marcar todos como leídos</button>
        <button id="btn-desmarcar-todos" class="secundario">Marcar todos como no leídos</button>
      </div>
    </aside>

    <div class="contenido">
      <div id="aviso-fuentes"></div>

      <main id="lista-posts">
        <p class="cargando">Cargando novedades…</p>
      </main>

      <div class="paginacion">
        <button id="btn-cargar-mas" style="display:none;">Cargar más</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
